name: Build Alpaka APK (Auto-triggered)

on:
  workflow_dispatch: # Позволяет запускать сборку вручную
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free up space
        uses: ./.github/actions/free_up_space

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Rust
        uses: moonrepo/setup-rust@v1

      - name: Install dependencies
        run: flutter pub get --suppress-analytics

      - name: Build APK
        run: flutter build apk --release --verbose --suppress-analytics # Сборка APK с подробным логом

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alpaka-msg-apk
          path: build/app/outputs/flutter-apk/app-release.apk
